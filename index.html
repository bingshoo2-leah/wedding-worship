<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>결혼예배순서</title>

  <style>
    body {
      margin: 0;
      background: #EFE9DD;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 18px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 720px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(46, 40, 36, 0.12);
      line-height: 0;
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 480px) {
      .page {
        padding: 24px 12px;
      }

      .card {
        border-radius: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <img src="Wedding-order-web.png" alt="결혼예배순서" />
    </section>
  </main>
</body>
</html>
